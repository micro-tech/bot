<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bot Control Panel</title>
        <!-- Version: 2026-06-10-v2.3.0 -->
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
                background: #1a1a2e;
                color: #e0e0e0;
            }
            h1 {
                color: #00d4ff;
            }
            #tabs {
                display: flex;
                gap: 5px;
                margin-bottom: 15px;
            }
            .tab-button {
                padding: 10px 20px;
                background: #16213e;
                color: #e0e0e0;
                border: 1px solid #0f3460;
                cursor: pointer;
            }
            .tab-button.active {
                background: #0f3460;
                color: #00d4ff;
                border-color: #00d4ff;
            }
            .llm-btn {
                margin-right: 6px;
                background: #16213e;
                color: #e0e0e0;
                border: 1px solid #0f3460;
            }
            .llm-btn.selected {
                border: 2px solid #00d4ff;
                color: #00d4ff;
                background: #0f3460;
            }
            .tab-content {
                display: none;
                background: #16213e;
                padding: 20px;
                border: 1px solid #0f3460;
            }
            .tab-content.active {
                display: block;
            }
            #chat-input {
                width: 70%;
                padding: 10px;
                background: #0d1b2a;
                color: #e0e0e0;
                border: 1px solid #0f3460;
            }
            #chat-send {
                padding: 10px 20px;
                background: #00897b;
                color: white;
                border: none;
                cursor: pointer;
            }
            #chat-messages {
                height: 400px;
                overflow-y: auto;
                border: 1px solid #0f3460;
                padding: 12px;
                margin-top: 10px;
                background: #0d1b2a;
            }
            .message {
                margin-bottom: 10px;
            }
            .sender {
                font-weight: bold;
                color: #00d4ff;
            }
            textarea {
                width: 100%;
                background: #0d1b2a;
                color: #e0e0e0;
                border: 1px solid #0f3460;
                padding: 8px;
            }
            button {
                margin-top: 8px;
                padding: 8px 16px;
                background: #0f3460;
                color: #00d4ff;
                border: 1px solid #00d4ff;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>
            Bot Control Panel
            <span style="font-size: 0.5em; color: #666"
                >v2026-06-10-v2.3.0</span
            >
        </h1>

        <div id="tabs">
            <button class="tab-button active" onclick="showTab('chat')">
                Chat
            </button>
            <button class="tab-button" onclick="showTab('config')">
                Config
            </button>
            <button class="tab-button" onclick="showTab('logs')">Logs</button>
        </div>

        <!-- CHAT TAB -->
        <div id="chat-tab" class="tab-content active">
            <div id="llm-selector" style="margin-bottom: 12px">
                <span>LLM: </span>
                <span id="llm-buttons"></span>
            </div>
            <input
                type="text"
                id="chat-input"
                placeholder="Type message..."
                onkeypress="if (event.key === 'Enter') sendChat();"
            />
            <button id="chat-send" onclick="sendChat()">Send</button>
            <div id="chat-messages"></div>
        </div>

        <!-- CONFIG TAB -->
        <div id="config-tab" class="tab-content">
            <h2>Config</h2>
            <textarea id="config-textarea" rows="20"></textarea>
            <button onclick="saveConfig()">Save Config</button>
            <div id="config-status"></div>
        </div>

        <!-- LOGS TAB -->
        <div id="logs-tab" class="tab-content">
            <h2>Logs</h2>
            <button onclick="loadLog('/logs/chat')">Chat Log</button>
            <button onclick="clearLog('/logs/chat/clear', 'chat')">
                Clear Chat Log
            </button>
            <button onclick="loadLog('/logs/error')">Error Log</button>
            <button onclick="clearLog('/logs/error/clear', 'error')">
                Clear Error Log
            </button>
            <pre
                id="log-output"
                style="
                    white-space: pre-wrap;
                    background: #0d1b2a;
                    padding: 12px;
                    border: 1px solid #0f3460;
                "
            ></pre>
        </div>

        <script>
            let ws;
            let selectedLlm = "";

            // Log functions defined first so they're always available
            function loadLog(url) {
                fetch(url)
                    .then((r) => r.text())
                    .then((t) => {
                        const out = document.getElementById("log-output");
                        if (out) out.textContent = t;
                    });
            }

            function clearLog(url, type) {
                fetch(url, { method: "POST" })
                    .then((r) => r.text())
                    .then((t) => {
                        const out = document.getElementById("log-output");
                        if (out) out.textContent = t;
                    });
            }

            function showTab(name) {
                document
                    .querySelectorAll(".tab-content")
                    .forEach((el) => el.classList.remove("active"));
                document
                    .querySelectorAll(".tab-button")
                    .forEach((el) => el.classList.remove("active"));
                const tab = document.getElementById(name + "-tab");
                if (tab) tab.classList.add("active");

                document.querySelectorAll(".tab-button").forEach((btn) => {
                    if (
                        btn.getAttribute("onclick") &&
                        btn.getAttribute("onclick").includes("'" + name + "'")
                    ) {
                        btn.classList.add("active");
                    }
                });
            }

            function connectWS() {
                const protocol =
                    location.protocol === "https:" ? "wss:" : "ws:";
                ws = new WebSocket(
                    protocol + "//" + location.hostname + ":8443/ws",
                );
                ws.onopen = () => console.log("WS connected");
                ws.onmessage = handleMessage;
                ws.onclose = () => setTimeout(connectWS, 3000);
            }

            function handleMessage(event) {
                const msg = JSON.parse(event.data);
                console.log("[WS] Received:", msg);

                if (msg.type === "config") {
                    const ta = document.getElementById("config-textarea");
                    if (ta) ta.value = msg.data;
                } else if (msg.type === "manifest") {
                    // ignore manifest on the UI for now
                } else if (msg.type === "backends") {
                    buildLlmButtons(msg.backends);
                } else if (
                    msg.type === "user_msg" ||
                    msg.type === "ollama_response" ||
                    msg.type === "llm_output"
                ) {
                    appendChat(msg);
                }
            }

            function buildLlmButtons(backends) {
                const container = document.getElementById("llm-buttons");
                if (!container) return;
                container.innerHTML = "";
                backends.forEach((b, i) => {
                    const btn = document.createElement("button");
                    btn.textContent = b.label;
                    btn.className = "llm-btn";
                    btn.dataset.id = b.id;
                    btn.onclick = () => selectLlm(b.id);
                    container.appendChild(btn);
                    // Auto-select the first backend
                    if (i === 0) selectLlm(b.id);
                });
            }

            function selectLlm(id) {
                selectedLlm = id;
                document.querySelectorAll(".llm-btn").forEach((el) => {
                    el.classList.toggle("selected", el.dataset.id === id);
                });
            }

            function sendChat() {
                const input = document.getElementById("chat-input");
                if (!input || !input.value.trim() || !ws) return;
                ws.send(
                    JSON.stringify({
                        type: "chat",
                        msg: input.value,
                        llm: selectedLlm,
                    }),
                );
                input.value = "";
            }

            function appendChat(msg) {
                console.log("[Chat] Appending message:", msg);
                const div = document.getElementById("chat-messages");
                if (!div) return;

                // Determine sender label
                let sender;
                if (msg.type === "user_msg") {
                    sender = msg.from || "You";
                } else {
                    // LLM response — use the backend name if available
                    sender = msg.from || "Bot";
                }

                // Text may be in msg.data or msg.msg
                const text = msg.data || msg.msg || "";
                if (!text) return;

                const p = document.createElement("div");
                p.className = "message";
                p.innerHTML = `<span class="sender">${sender}:</span> ${text}`;
                div.appendChild(p);
                div.scrollTop = div.scrollHeight;
            }

            function saveConfig() {
                const val = document.getElementById("config-textarea").value;
                if (ws)
                    ws.send(JSON.stringify({ type: "config_save", data: val }));
            }

            window.onload = () => {
                connectWS();
            };
        </script>
    </body>
</html>
