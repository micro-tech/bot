[package]
name = "bot"
version = "0.0.3"
edition = "2024"

[lints.rust]
dead_code = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_imports = "allow"

[dependencies]
anyhow = "1.0.102"
dotenvy = "0.15.7"
async-trait = "0.1.89"
dashmap = "6.1.0"
gemini_crate = "0.1.0"
grok_api = "0.1.3"
# sqlite-vss = { version = "0.1.2", features = ["download-libs"] } # Temporarily commented out due to unsupported platform error on Windows x86_64
hartbeat = "0.1.0"
ollama-rs = "0.3.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
toml = "0.8.23"
log = "0.4.29"
env_logger = "0.11.10"
backon = "1.6.0"
chrono = "0.4.44"
reqwest = { version = "0.13.2", features = [
    "blocking",
    "rustls",
    "json",
], default-features = false }
lettre = { version = "0.11", default-features = false, features = [
    "smtp-transport",
    "builder",
    "rustls-tls",
] }
native-tls = "0.2"
imap = "2"
axum = { version = "0.8.8", features = ["ws"] }
tower-http = { version = "0.6.8", features = ["cors", "trace"] }
tokio = { version = "1.51.1", features = ["full", "io-util"] }
axum-server = { version = "0.8.0", features = ["tls-rustls"] }
rcgen = "0.14.7"
futures-util = "0.3.32"
uuid = { version = "1.23", features = ["v4", "serde"] }
rand = "0.10.1"
pulldown-cmark = "0.13.3"
similar = "3.1.0"


[[bin]]
name = "test_ollama"
path = "src/bin/test_ollama.rs"
