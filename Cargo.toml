[package]
name = "bot"
version = "1.0.0"
edition = "2021"

[dependencies]
serenity = { version = "0.11", features = ["model", "cache", "gateway"] }
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
dotenv = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }