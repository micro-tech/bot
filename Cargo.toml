[package]
name = "bot"
version = "0.0.1"
edition = "2024"

[dependencies]
dashmap = "6.1.0"
gemini_crate = "0.1.0"
grok_api = "0.1.2"
# sqlite-vss = { version = "0.1.2", features = ["download-libs"] } # Temporarily commented out due to unsupported platform error on Windows x86_64
hartbeat = "0.1.0"
ollama-rs = "0.3.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
toml = "0.8.23"
log = "0.4.29"
env_logger = "0.11.9"
backon = "1.6.0"
chrono = "0.4.44"
reqwest = { version = "0.13.2", features = ["blocking"] }
axum = { version = "0.8.8", features = ["ws"] }
tower-http = { version = "0.6.8", features = ["cors", "trace"] }
axum-server = { version = "0.8.0", features = ["tls-rustls"] }
rcgen = "0.14.7"
futures-util = "0.3.32"
tokio = { version = "1.50.0", features = ["full", "io-util"] }

[[bin]]
name = "test_ollama"
path = "src/bin/test_ollama.rs"