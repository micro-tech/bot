[package]
name = "bot"
version = "1.0.0"
edition = "2021"

[dependencies]
log = "0.4"
env_logger = "0.10"
serenity = { version = "0.11", features = ["model", "cache", "gateway"] }
tokio = { version = "1.0", features = ["macros", "rt-multi-thread", "time"] }
dotenv = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.11", features = ["json"] }
serde_json = "1.0"
